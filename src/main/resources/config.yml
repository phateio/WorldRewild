# WorldRewild — keep resource worlds fresh by regenerating chunks through the
# vanilla generator. Two independent features share the worlds list below:
#   resident-sweep  — slow background age sweep of whole regions (off by default)
#   structure-reset — fast targeted reset of specific rare structures

# Worlds both features operate on, swept in order. Each needs a name and a required
# min-age — a duration like 90d / 6h / 10m / 1d12h (units d/h/m/s, concatenable):
# the age sweep regenerates a chunk once its region-file timestamp is that old (that
# timestamp is bumped when the chunk is modified and saved — built/broken/looted, or
# by our own regen — not by merely loading it). A world with a missing or malformed
# min-age is skipped with a warning. The region directory is derived from the loaded
# world via the Bukkit API (Paper custom dimensions like world_2024 resolve
# correctly); set region-dir, relative to the world container, only for a
# non-standard layout.
worlds:
  - name: world_2024
    min-age: 90d
  - name: world_2024_nether
    min-age: 30d
  - name: world_2024_the_end
    min-age: 1d

# ---------------------------------------------------------------------------
# Resident wilderness sweep. Processes each world one region file at a time
# ("tile" = 32x32 chunks), nearest-to-spawn first. Every tile is regenerated
# two-phase: delete each eligible chunk's data (via Paper's Moonrise chunk system),
# then reload so vanilla regenerates it from scratch (terrain, structures, structure
# mobs), then unload/save. Deleting the whole tile first lets interior chunks
# regenerate free of old neighbours, so a cross-version map actually converts
# instead of blending back toward the old terrain; a thin biome-only rim on tile
# edges heals when that area is next swept. No FAWE.
resident-sweep:
  # Run automatically at boot. Off by default (it is the heavy part) — start it on
  # demand with /wr start. structure-reset below runs regardless of this.
  enabled: false

  # Skip regenerating any chunk that is unchanged since we last reset it — detected
  # by the region file's per-chunk timestamp still matching the one we stamped right
  # after regenerating it (stamps kept in plugins/WorldRewild/stamps/). Without this,
  # our own regen keeps bumping that timestamp, so a chunk nobody has touched is
  # re-regenerated on every cycle forever — most wastefully in the End, whose vast
  # void would otherwise be re-reset daily. Chunks we have never reset have no stamp
  # and stay eligible, so a first-time cross-version conversion still sweeps once.
  skip-unchanged-chunks: true

  # When a sweep pass actually regenerates the central-island chunk (0,0) of an End
  # world — clearing the exit portal / gateways the fight reads to decide "already
  # killed" — reset the dragon fight so a fresh dragon spawns on the next entry. Passes
  # that regenerate nothing there (nobody visited, so skip-unchanged skips it) leave the
  # fight alone. End worlds are auto-detected; /wr end reset forces it on demand.
  respawn-dragon: true

  # After a full sweep of all worlds, wait this long before sweeping again.
  sweep-interval: 1h

  # TPS gate (Paper 1-minute average). Pause below tps-pause, resume at/above
  # tps-resume (hysteresis so it does not flap around 18).
  tps-pause: 18.0
  tps-resume: 18.5

  # Pacing. Every interval-ticks the engine dispatches up to per-tick reloads, never
  # exceeding max-concurrent-regens in flight (the real cost is chunk generation, off
  # the main thread). The delete phase runs at up to per-tick*4 per tick. Steady-state
  # throughput is limited by the server's chunk-generation worker pool (~10-15/s here).
  interval-ticks: 2
  per-tick: 4
  max-concurrent-regens: 4

  # Skip any chunk with an online player within this many chunks (Chebyshev). Loaded
  # chunks are always skipped too (deleting a loaded chunk would be undone when its
  # in-memory copy re-saves). Skipped chunks are retried next sweep.
  player-safe-radius-chunks: 4

  # Skip chunks within this many chunks of each world's spawn (Chebyshev).
  # 0 = also regenerate spawn. Raise this to protect the Spawn2024 area.
  protect-spawn-radius-chunks: 0

  # Safety valve: if this many deletes fail in a row (e.g. Moonrise internals changed
  # on a Paper update), auto-pause and log a SEVERE warning.
  max-consecutive-failures: 5

  # Persist progress and resume an in-progress sweep on server start.
  auto-resume: true

# ---------------------------------------------------------------------------
# Structure reset — regenerate specific rare structures on a fast cycle, independent
# of the age sweep. Structures are found automatically by reading each chunk's stored
# structure data (structures.starts) from the region files, so no in-game marking is
# needed. Each footprint is regenerated with the same two-phase core, skipping any a
# player is currently in — and, when skip-unchanged-chunks is on, any unchanged since
# its last reset, so only raided structures are refreshed.
structure-reset:
  # Reset shortly after boot, then on every wall-clock multiple of the interval past
  # local midnight (e.g. 6h -> 00:00/06:00/12:00/18:00). It re-arms from the clock
  # each cycle, so it stays aligned and never drifts.
  enabled: true
  interval: 6h

  # How often to re-scan region files for newly generated structures. The first scan
  # is a full pass (heavier, async); later scans only re-read chunks saved since, so
  # they are cheap.
  rescan: 7d

  # Extra chunks added around each structure's footprint before regenerating.
  # Same-version regen needs no margin (0); raise only if edges look off.
  footprint-margin-chunks: 0

  # Soft-dependency on the Residence plugin (https://github.com/Zrips/Residence).
  # When Residence is installed and this is on, players cannot create, subzone,
  # resize, or add an area to a residence that would cover any chunk of a reset
  # structure's footprint — the next reset would wipe the build, and this stops
  # players fencing off a stronghold / mansion / pyramid etc. from everyone else.
  # The blocked area is the whole footprint bounding box (exactly what gets reset),
  # so a large sparse structure like a stronghold blocks claims across its bbox.
  # Existing residences are never touched; only rewilded worlds have reset
  # structures, so permanent worlds are unaffected. Players with
  # worldrewild.bypass.structureclaim (op by default) are exempt. No effect if
  # Residence is absent.
  block-residence-claims: true

  # Structure types to reset (Minecraft ids without the namespace). Rare, high-value,
  # low-count ones only, so the fast cycle stays light. Left out: common ones
  # (shipwreck, monument, trial_chambers, buried_treasure, mineshaft, villages,
  # ocean_ruin, ruined_portal) and the very numerous ancient_city / end_city — those
  # refresh via the slower age sweep instead.
  types:
    - mansion
    - stronghold
    - jungle_pyramid
    - desert_pyramid
    - pillager_outpost
    - bastion_remnant
