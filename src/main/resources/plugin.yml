name: ${name}
version: ${version}
main: io.github.phateio.worldrewild.WorldRewild
api-version: "1.21"
author: shikendon
description: A Paper plugin for rewilding resource worlds.
softdepend: [Residence]
commands:
  worldrewild:
    aliases: [wr]
    description: Rewild resource worlds by regenerating long-untouched chunks.
    permission: worldrewild.admin
    usage: "/wr <start|pause|resume|stop|status|count|reset|reload|region|vanillaregen|struct|end|probe|entities>"
permissions:
  worldrewild.admin:
    description: Manage the rewilder.
    default: op
  worldrewild.bypass.structureclaim:
    description: Exempt from the block on claiming residences over reset structures.
    default: op
