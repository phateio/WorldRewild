name: WorldRewild
version: 0.7.0
main: io.github.phateio.worldrewild.WorldRewild
api-version: "1.21"
author: shikendon
description: A Paper plugin for rewilding resource worlds.
commands:
  worldrewild:
    aliases: [wr]
    description: Rewild resource worlds by regenerating long-untouched chunks.
    permission: worldrewild.admin
    usage: "/wr <start|pause|resume|stop|status|count|reset|reload|region|vanillaregen|probe|entities>"
permissions:
  worldrewild.admin:
    description: Manage the rewilder.
    default: op
